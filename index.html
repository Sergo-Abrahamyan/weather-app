<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="sunny">
  <div class="container">
    <header>
      <h1><i class="fas fa-cloud-sun"></i> Weather App</h1>
      <div class="search-box">
        <input type="text" id="city-input" placeholder="Search city..." />
        <button id="search-btn"><i class="fas fa-search"></i></button>
      </div>
    </header>

    <main>
      <div class="weather-card" id="weather-card">
        <div class="location">
          <h2 id="city-name">London</h2>
          <p id="country">United Kingdom</p>
        </div>
        <div class="current-weather">
          <div class="temp-box">
            <span id="temperature">18</span>
            <span class="unit">°C</span>
          </div>
          <div class="weather-icon">
            <i class="fas fa-sun" id="weather-icon"></i>
          </div>
        </div>
        <p id="description">Clear Sky</p>
        <div class="details">
          <div class="detail-item">
            <i class="fas fa-tint"></i>
            <span>Humidity</span>
            <strong id="humidity">62%</strong>
          </div>
          <div class="detail-item">
            <i class="fas fa-wind"></i>
            <span>Wind</span>
            <strong id="wind">14 km/h</strong>
          </div>
          <div class="detail-item">
            <i class="fas fa-eye"></i>
            <span>Visibility</span>
            <strong id="visibility">10 km</strong>
          </div>
          <div class="detail-item">
            <i class="fas fa-thermometer-half"></i>
            <span>Feels Like</span>
            <strong id="feels-like">16°C</strong>
          </div>
        </div>
      </div>

      <div class="forecast">
        <h3>5-Day Forecast</h3>
        <div class="forecast-grid" id="forecast-grid">
          <div class="forecast-card">
            <p class="day">Mon</p>
            <i class="fas fa-sun"></i>
            <p class="temp">21°C</p>
          </div>
          <div class="forecast-card">
            <p class="day">Tue</p>
            <i class="fas fa-cloud"></i>
            <p class="temp">17°C</p>
          </div>
          <div class="forecast-card">
            <p class="day">Wed</p>
            <i class="fas fa-cloud-rain"></i>
            <p class="temp">13°C</p>
          </div>
          <div class="forecast-card">
            <p class="day">Thu</p>
            <i class="fas fa-cloud-sun"></i>
            <p class="temp">19°C</p>
          </div>
          <div class="forecast-card">
            <p class="day">Fri</p>
            <i class="fas fa-sun"></i>
            <p class="temp">23°C</p>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
